<div class="card mb-4 compact-table">
  <div class="flex justify-between items-center mb-3">
    <h2 class="text-xl font-semibold">Listado de Pedidos</h2>
  </div>

  <p-table
    #dt
    [value]="orderList"
    stripedRows
    dataKey="id"
    [rows]="10"
    [rowsPerPageOptions]="[10,20,50]"
    [paginator]="true"
    [loading]="loading"
    [globalFilterFields]="['id','customerName','status']"
    size="small"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} pedidos"
  >
    <ng-template #caption>
      <div class="flex justify-end mb-2 gap-2">
        <input
          pInputText
          type="text"
          (input)="dt.filterGlobal($event.target.value,'contains')"
          placeholder="Buscar..."
        />
      </div>
    </ng-template>

    <ng-template #header>
      <tr>
        <th>Nro</th>
        <th>Fecha</th>
        <th>Cliente</th>
        <th>Items</th>
        <th>Total</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template #body let-order let-rowIndex="rowIndex">
      <tr class="text-sm">
        <td>{{ rowIndex + 1 }}</td>
        <td>{{ order.date | date:'short' }}</td>
        <td>{{ order.customerName || 'Sin cliente' }}</td>
        <td>{{ order.itemsCount }}</td>
        <td>{{ order.total | currency:'BOB' }}</td>
        <td>
          <p-tag [value]="order.status" [severity]="getStatusSeverity(order.status)" class="text-xs py-1 px-2"></p-tag>
        </td>
        <td class="flex gap-1 flex-wrap justify-center">
          <p-button
            icon="pi pi-search"
            [rounded]="true"
            [text]="true"
            severity="info"
            (onClick)="confirmViewOrder($event, order)"
          ></p-button>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="7" class="text-center text-sm">No se encontraron pedidos.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
